    <title>Jakob Friedl - Terminal</title>
    <link rel="icon" href="../assets/img/favicon.ico" type="image/x-icon">
</head>
<body>
    <header>
        <h1 class="effect" data-value="JAKOB FRIEDL">JAKOB FRIEDL</h1>
        <div>
            <h3>Type '<span class="highlight">help</span>' to list all available commands.</h3>  
            <nav>
                <ul>
                    <li><h2><a href="/">home</a></h2></li>
                    <li><h2>|</h2></li>
                    <li><h2><a href="/blog">blog</a></h2></li>
                    <li><h2>|</h2></li>
                    <li><h2><a href="mailto:jakobfriedl2610@gmail.com">contact</a></h2></li>

                    <li><a href="about">about</a></li>
                    <li><a href="contact">contact</a></li> -->
                </ul>
            </nav>  
        </div> 
    </header>

    <div id="terminal-header">
        <div id="terminal-buttons">
            <span class="minimize"></span>
            <span class="maximize"></span>
            <span class="close"></span>
        </div>
    </div>
    <div id="main">
        <div class="history" readonly>
        </div>
        <div class="prompt">
            <div>
                <span class='username'>guest</span>@<span class='hostname'>localhost</span><span id="pwd">:~$</span>
            </div>
            <input id="command" class="command" type="text" name="command" autofocus onblur="this.focus()"><br>
        </div>
        <span class='suggestions'></span>
    </div>
    
    <footer>
        <small>Jakob Friedl © 2023</small>
    </footer>
</body>
</html>
